name: Deploy → Prod

on:
  push:
    branches: ["main"]

env:
  AWS_REGION:   ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  test:
    name: Testes antes do deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: |
          pip install torch==2.7.1 torchvision==0.22.1 torchaudio==2.7.1 \
            --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pytest
      - run: pytest tests/ -v --tb=short

  deploy:
    name: Build + Push + Deploy (prod)
    runs-on: ubuntu-latest
    needs: test        # só deploy se os testes passarem

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login no ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build e push — pipeline
        run: |
          IMAGE=$ECR_REGISTRY/siab-pipeline:prod-${{ github.sha }}
          LATEST=$ECR_REGISTRY/siab-pipeline:latest
          docker build -t $IMAGE -t $LATEST .
          docker push $IMAGE
          docker push $LATEST
          echo "PIPELINE_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Build e push — frontend
        run: |
          IMAGE=$ECR_REGISTRY/siab-frontend:prod-${{ github.sha }}
          LATEST=$ECR_REGISTRY/siab-frontend:latest
          docker build -t $IMAGE -t $LATEST ./frontend
          docker push $IMAGE
          docker push $LATEST
          echo "FRONTEND_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy na EC2 de prod
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PROD_EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/siab
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            export PIPELINE_IMAGE=${{ env.PIPELINE_IMAGE }}
            export FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

            echo "✅ Deploy prod concluído — ${{ github.sha }}"
